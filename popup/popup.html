<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/icon16.png">
  <title>Course2Cal for RWeb</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 15px;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
      opacity: 0.7;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
    #resultsContainer {
      display: none;
      margin-top: 15px;
    }
    #resultsList {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .course-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .course-title-input {
      width: 100%;
      box-sizing: border-box;
      font-weight: bold;
      margin-bottom: 5px;
      padding: 8px;
      border: 1px dashed #aaa;
      border-radius: 4px;
      font-size: 14px;
      background-color: #fcfcfc;
      transition: all 0.2s;
    }
    .course-title-input:hover {
      border: 1px solid #007bff;
      background-color: #fff;
    }
    .course-title-input:focus {
      outline: none;
      border: 1px solid #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,.25);
      background-color: #fff;
    }
    .editable-hint {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .course-details {
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }
    #confirmBtn {
      background-color: #28a745;
    }
    #confirmBtn:hover {
      background-color: #218838;
    }
    #warning-container {
      display: none;
      background-color: #fff3cd;
      border: 1px solid #ffeeba;
      color: #856404;
      padding: 12px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.5;
    }
    #warning-container a {
      color: #0056b3;
      text-decoration: underline;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Course2Cal for RWeb</h2>
  
  <div id="main-controls">
    <button id="scrapeBtn">Scrape Courses</button>
  </div>

  <div id="warning-container">
    To use this extension, please go to either 
    <a href="https://registrationssb.ucr.edu/StudentRegistrationSsb/ssb/classRegistration/classRegistration" target="_blank">Register for Classes</a> 
    or 
    <a href="https://registrationssb.ucr.edu/StudentRegistrationSsb/ssb/registrationHistory/registrationHistory" target="_blank">View Your Class Schedule</a> 
    in RWeb Registration.
  </div>
  
  <div id="status"></div>
  
  <div id="resultsContainer">
    <div id="resultsList"></div>
    <button id="confirmBtn">Confirm & Sync to Calendar</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
