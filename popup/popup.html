<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RWeb Course2Cal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 15px;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
      opacity: 0.7;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>RWeb Course2Cal</h2>
  <button id="scrapeBtn">Scrape Courses</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
